<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Reels</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    body {
        background: #0f0f0f;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }
    
    .card {
        background: #1e1e1e;
        border: 1px solid #2d2d2d;
        border-radius: 16px;
        padding: 30px;
        width: 90%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
        font-size: 24px;
        margin-bottom: 12px;
        color: #fff;
    }

    p {
        font-size: 14px;
        color: #a8a8a8;
        margin-bottom: 24px;
        line-height: 1.5;
    }

    button {
        width: 100%;
        padding: 14px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        color: white;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
    }

    button:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    /* Yükleme Ekranı Stilleri */
    #loading {
        display: none;
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #333;
        border-top: 4px solid #e6683c;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .status-text {
        font-family: monospace;
        font-size: 13px;
        color: #00ff66;
        background: #111;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #222;
        min-height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Şaka Ekranı Stilleri */
    #joke {
        display: none;
    }

    .warning-icon {
        font-size: 48px;
        margin-bottom: 10px;
    }

    .joke-title {
        color: #ff4757;
        font-size: 22px;
        margin-bottom: 10px;
    }

    .btn-secondary {
        background: #333;
        margin-top: 15px;
    }
    .btn-secondary:hover {
        background: #444;
    }
</style>
</head>
<body>

<div class="card">

    <!-- Başlangıç Ekranı -->
    <div id="start">
        <h1>🎬 Reels Videosunu Aç</h1>
        <p>Özel içerik yükleniyor. Videoyu oynatmak için aşağıdaki butona basınız.</p>
        <button onclick="run()">İçeriği Görüntüle</button>
    </div>

    <!-- Yükleme/İşlem Ekranı -->
    <div id="loading">
        <div class="spinner"></div>
        <p style="margin-bottom: 15px;">Bağlantı kuruluyor...</p>
        <div class="status-text" id="text">Sunucuya bağlanılıyor...</div>
    </div>

    <!-- Şaka Ekranı -->
    <div id="joke">
        <div class="warning-icon">⚠️</div>
        <h2 class="joke-title">SİSTEM UYARISI</h2>
        <p id="final-desc">BİLGİSAYARINIZDA VİRÜS TESPİT EDİLDİ!!!!!!!!!!!!!!!!</p>
        <button class="btn-secondary" onclick="location.reload()">Baştan Başla</button>
    </div>

</div>

<script>
function run() {
    document.getElementById("start").style.display = "none";
    document.getElementById("loading").style.display = "block";

    // Daha gerçekçi ve sırayla ilerleyen mesaj listesi (virgüller düzeltildi)
    let texts = [
        "Sistem önbelleği taranıyor...",
        "Görsel veriler ayıklanıyor...",
        "Trojan.Win32.Generic yüklendi... ",
        "Sistem erişimi sağlandı...",
        "Son adımlara geçiliyor: 5",
        "Son adımlara geçiliyor: 4",
        "Virüs_deneme.Win64X.exe yüklendi!!! 3",
        "Son adımlara geçiliyor: 2",
        "Troya_deneme.win32.exe  1",
        "İşlem tamamlandı!"
    ];

    let i = 0;

    let interval = setInterval(() => {
        document.getElementById("text").innerText = texts[i];
        i++;

        if (i === texts.length) {
            clearInterval(interval);

            setTimeout(() => {
                document.getElementById("loading").style.display = "none";
                document.getElementById("joke").style.display = "block";
            }, 1000);
        }
    }, 1000);
}
</script>

</body>
</html>
